<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FootFlex Store Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Настройка цветов под тему Telegram */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --btn-color: var(--tg-theme-button-color, #3390ec);
            --btn-text-color: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #707579);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            background-color: var(--secondary-bg);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px; /* Отступ для Главной Кнопки */
        }

        /* Красивая карточка товара */
        .product-card {
            background-color: var(--bg-color);
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        /* Контейнер для фото (чтобы они были одного размера) */
        .product-img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Картинка заполняет место, не сжимаясь */
        }

        .product-body {
            padding: 15px;
        }

        .product-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-desc {
            color: var(--hint-color);
            font-size: 14px;
            margin-bottom: 10px;
            height: 40px; /* Ограничиваем описание по высоте */
            overflow: hidden;
        }

        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--btn-color);
        }

        /* Выбор размера */
        .size-picker {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .size-badge {
            background-color: var(--secondary-bg);
            color: var(--text-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .size-badge.selected {
            background-color: var(--btn-color);
            color: var(--btn-text-color);
            border-color: var(--btn-color);
        }
    </style>
</head>
<body>

<div class="container-fluid p-3">
    <h1 class="h3 mb-3 fw-bold">Каталог Premium</h1>

    <div class="row g-3">
        <div class="col-6">
            <div class="product-card" id="p1">
                <div class="product-img-container">
                    <img src="https://placehold.co/300x300/3390ec/white?text=Sneaker+1" class="product-img" alt="Кроссовки 1">
                </div>
                <div class="product-body">
                    <div class="product-title">Street Ace Blue</div>
                    <div class="product-desc">Лёгкие, городские. На каждый день.</div>
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="product-price">$120</div>
                    </div>
                    <div class="size-picker" data-product-id="p1">
                        <div class="size-badge" data-size="41">41</div>
                        <div class="size-badge" data-size="42">42</div>
                        <div class="size-badge" data-size="43">43</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-6">
            <div class="product-card" id="p2">
                <div class="product-img-container">
                    <img src="https://placehold.co/300x300/e74c3c/white?text=Sneaker+2" class="product-img" alt="Кроссовки 2">
                </div>
                <div class="product-body">
                    <div class="product-title">Swift Run Grey</div>
                    <div class="product-desc">Спортивный стиль. Амортизация.</div>
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="product-price">$99</div>
                    </div>
                    <div class="size-picker" data-product-id="p2">
                        <div class="size-badge" data-size="42">42</div>
                        <div class="size-badge" data-size="43">43</div>
                        <div class="size-badge" data-size="44">44</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Настраиваем Главную Кнопку Telegram (снизу экрана)
    tg.MainButton.text = "Купить (выберите размер)";
    tg.MainButton.textColor = "#ffffff";
    tg.MainButton.color = "#3390ec";
    
    let currentOrder = null; // Здесь храним, что пользователь хочет купить

    // Обработка выбора размера
    const sizeBadges = document.querySelectorAll('.size-badge');
    sizeBadges.forEach(badge => {
        badge.addEventListener('click', () => {
            const container = badge.closest('.size-picker');
            const productId = container.getAttribute('data-product-id');
            const card = document.getElementById(productId);
            const productTitle = card.querySelector('.product-title').innerText;
            const size = badge.getAttribute('data-size');

            // Убираем выделение у других размеров в этом товаре
            container.querySelectorAll('.size-badge').forEach(b => b.classList.remove('selected'));
            // Убираем выделение у размеров ВООБЩЕ ВЕЗДЕ (чтобы за один раз покупали один товар)
            document.querySelectorAll('.size-badge').forEach(b => b.classList.remove('selected'));
            
            // Выделяем текущий размер
            badge.classList.add('selected');

            // Обновляем данные заказа
            currentOrder = {
                item: productTitle,
                size: size
            };

            // Показываем Главную Кнопку Telegram
            tg.MainButton.text = `Купить: ${productTitle} (${size})`;
            tg.MainButton.show();
        });
    });

    // Обработка нажатия на Главную Кнопку Telegram
    tg.onEvent('mainButtonClicked', function(){
        if (currentOrder) {
            // Отправляем данные боту (обязательно строка!)
            tg.sendData(JSON.stringify(currentOrder));
        }
    });

</script>

</body>
</html>
